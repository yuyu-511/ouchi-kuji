<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D賞① — おうちくじ</title>
  <meta name="description" content="おうちくじ D賞①">
  <link rel="stylesheet" href="../css/style.css">

<body data-password="lhyx8u8d">

  <header class="site-header">
    <a class="back-link" href="../index.html">← くじ一覧</a>
    <nav></nav>
  </header>

  <div class="page-wrap">

    <section class="kuji-hero">
      <div class="letter-card">

        <div class="artwork-frame">
          <!--
            画像を追加するとき:
            <img src="../images/d-prize-1.jpg" alt="D賞①">
          -->
          
        </div>

        <div class="letter-eyebrow fade-up">
          <span class="dot"></span>
          おうちくじ &nbsp;/&nbsp; D賞①
        </div>

        <h1 class="letter-title fade-up">
          <span class="num-accent">D賞①</span>の<br>メッセージ
        </h1>

        <p class="letter-desc fade-up">
          ボイスメッセージですっ<br><br>
          下の動画も一緒に見ようねっ！
        </p>

        <div class="voice-player fade-up">
          <button class="play-btn" id="play-btn" aria-label="再生 / 一時停止">
            <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor">
              <path d="M8 5v14l11-7z"/>
            </svg>
            <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
            </svg>
          </button>
          <div class="player-controls">
            <div class="player-label">🎙 ボイスメッセージ</div>
            <div class="player-time">
              <span class="time-current">0:00</span>
              <span class="time-total">0:00</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill"></div>
            </div>
            <p class="player-status">タップして聴いてね </p>
            <p class="audio-error">⚠ 音声ファイルが見つかりません（audio/d-prize-1.m4a）</p>
          </div>
        </div>

        <div class="waveform-deco">
          <div class="bar"></div><div class="bar"></div><div class="bar"></div>
          <div class="bar"></div><div class="bar"></div><div class="bar"></div>
          <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>

        <div class="scroll-hint">
          <span class="hint-emoji">▽</span>
          スクロールして動画へ
        </div>

      </div>
    </section>

    <section class="today-section">
      <div class="today-header">
        <div class="today-badge">🎬 YouTube</div>
        <h2>この動画、一緒に見よ！</h2>
        <p class="today-sub">
          <!-- ここの文言は自由に編集してね -->
        </p>
      </div>

      <div class="fav-section">
        <div class="fav-cards">

          <div class="fav-card">
            <div class="yt-embed-wrap" data-ytid="1G6tftTrUHgg">
              <div class="yt-thumbnail">
                <img src="https://img.youtube.com/vi/1G6tftTrUHgg/mqdefault.jpg"
                     alt="Numb Little Bug" loading="lazy">
                <div class="yt-play-icon"></div>
              </div>
              <span class="yt-owner-tag me">your favorite song</span>
            </div>
            <div class="fav-card-body">
              <p class="fav-card-title">Numb Little Bug</p>
              <p class="fav-card-channel">Em Beihold</p>
            </div>
          </div>

          <div class="fav-card">
            <div class="yt-embed-wrap" data-ytid="4NRXx6U8BFQ">
              <div class="yt-thumbnail">
                <img src="https://img.youtube.com/vi/4NRXx6U8BFQ/mqdefault.jpg"
                     alt="abcdefu" loading="lazy">
                <div class="yt-play-icon"></div>
              </div>
              <span class="yt-owner-tag you">my favorite song</span>
            </div>
            <div class="fav-card-body">
              <p class="fav-card-title">abcdefu</p>
              <p class="fav-card-channel">GAYLE</p>
            </div>
          </div>

        </div>
      </div>
    </section>

  <footer class="site-footer">
    <a href="../index.html">おうちくじ</a>
    &nbsp;·&nbsp; D賞①
    &nbsp;<span class="heart">♡</span>
  </footer>

  <audio id="track-audio" preload="none">
    <source src="../audio/d-prize-1.m4a" type="audio/mpeg">
  </audio>

  <script src="../js/password.js"></script>
  <script src="../js/script.js"></script>

</html>
